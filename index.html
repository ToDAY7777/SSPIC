<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSPIC | Inicio</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>
<body>

    <header>
        <div class="top-bar">
            <div class="container top-bar-content">
                <span>Conectando y creciendo juntos</span>
                <div class="contact-info">
                    <span><i class="fas fa-envelope"></i> contacto@sspic.com.mx</span>
                    <span><i class="fas fa-phone-alt"></i> +52 55 1234 5678</span>
                    <span class="social-icons">
                        <i class="fab fa-twitter"></i>
                        <i class="fab fa-linkedin-in"></i>
                    </span>
                </div>
            </div>
        </div>

        <nav class="main-nav">
            <div class="container nav-content">
                <div class="logo">
                    <img src="./logo.png" alt="Logo Icon">
                </div>
                
                <div class="menu-links">
                    <button onclick="navegar('inicio')" class="active">INICIO</button>
                    <button onclick="navegar('nosotros')">NOSOTROS</button>
                    <button onclick="navegar('servicios')">SERVICIOS</button>
                    <button onclick="navegar('contacto')">CONTACTO</button>
                </div>
            </div>
        </nav>
    </header>

    <main id="app">
        </main>
        <footer class="main-footer">
        <div class="container footer-grid">
            <div class="footer-logo">
                <img src="./logo.png" alt="Logo Empresa">
                
            </div>

            <div class="footer-info">
                <p><strong>contacto@teintmex.com.mx</strong></p>
                <p><strong>(+52) 984 191 6371</strong></p>
            </div>
        </div>

        <div class="footer-bottom">
            <div class="container bottom-content">
                <span>Copyright © 2026 All rights reserved</span>
                <a href="#">Aviso de Privacidad</a>
            </div>
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
