<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSPIC | Infraestructura</title>
    
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <header>
        <div class="top-bar">
            <div class="container top-bar-content">
                <span>Conectando y creciendo juntos</span>
                <div class="contact-info">
                    <span><i class="fas fa-envelope"></i> contacto@sspic.com.mx</span>
                    <span class="social-icons">
                        <i class="fab fa-twitter"></i>
                        <i class="fab fa-linkedin-in"></i>
                    </span>
                </div>
            </div>
        </div>

        <nav class="main-nav">
            <div class="container nav-content">
                <div class="logo">
                    <img src="./logo.png" alt="Logo SSPIC">
                </div>
                <div class="menu-links">
                    <button onclick="navegar('inicio')" class="nav-btn active">INICIO</button>
                    <button onclick="navegar('nosotros')" class="nav-btn">NOSOTROS</button>
                    <button onclick="navegar('servicios')" class="nav-btn">SERVICIOS</button>
                    <button onclick="navegar('contacto')" class="nav-btn">CONTACTO</button>
                </div>
            </div>
        </nav>
    </header>

    <main id="app">
        </main>

    <footer class="main-footer">
        <div class="container footer-grid">
            <div class="footer-logo">
                <img src="./logo.png" alt="Logo Footer">
            </div>
            <div class="footer-info">
                <p><strong>(+52) 984 191 6371</strong></p>
            </div>
        </div>
    </footer>

    <script src="app.js"></script>
</body>
</html>
